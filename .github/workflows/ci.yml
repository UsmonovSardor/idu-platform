name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: idu
          POSTGRES_PASSWORD: idu_test
          POSTGRES_DB: idu_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: idu-backend

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://idu:idu_test@localhost:5432/idu_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test_secret_not_for_prod_1234567890abcdef
      PORT: 3001

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: idu-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run migrations
        run: node migrate.js

      - name: Run tests
        run: npm test

  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: idu-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: idu-backend/package-lock.json
      - run: npm ci
      - run: npx eslint . --ext .js --max-warnings 0 || true

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t idu-platform:${{ github.sha }} .

      - name: Smoke test container
        run: |
          docker run -d --name idu_smoke \
            -e NODE_ENV=production \
            -e JWT_SECRET=smoke_test_secret \
            -e DATABASE_URL=postgresql://localhost/noop \
            -p 3002:3000 \
            idu-platform:${{ github.sha }} || true
          sleep 3
          docker logs idu_smoke 2>&1 | head -20 || true
          docker stop idu_smoke || true
